name: Export to PDF

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq pandoc texlive-xetex texlive-latex-extra texlive-lang-chinese fonts-noto-cjk
      - run: bash export/build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: 强基数学-第1章-函数
          path: export/gaokao-wiki.pdf
