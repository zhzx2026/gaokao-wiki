name: Export to PDF

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq texlive-xetex texlive-latex-extra texlive-lang-chinese fonts-noto-cjk
      - run: bash export/oi-wiki/build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: 强基数学-PDF
          path: export/gaokao-wiki.pdf
